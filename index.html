<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Amingle</title>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.header{
padding:20px;
font-size:35px;
font-weight:bold;
}

.rules{
width:90%;
max-width:600px;
margin:auto;
background:#111;
padding:20px;
border-radius:15px;
}

.start-btn{
margin-top:20px;
padding:15px 40px;
font-size:20px;
background:#6c4cff;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

video{
width:90%;
max-width:700px;
margin-top:20px;
border-radius:15px;
background:#222;
}
</style>
</head>

<body>

<div class="header">
Amingle
</div>

<video id="localVideo" autoplay muted playsinline></video>

<div class="rules">
<h2>Welcome to Amingle</h2>

<p>🔞 You must be 18+</p>
<p>No nudity or harassment</p>
<p>Respect all users</p>

<button class="start-btn" onclick="startCamera()">
Start Chat
</button>

</div>

<script>
async function startCamera(){
try{
const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject = stream;

}catch(err){
alert("Camera permission denied");
}
}
</script>

</body>
</html>
