<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amingle</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:400px;
    background:#1a1a1a;
    padding:25px;
    border-radius:15px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

p{
    color:#aaa;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#2b2b2b;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#6c4cff;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

#result{
    margin-top:15px;
    color:#00ff88;
}
</style>
</head>

<body>

<div class="container">

    <h1>💬 Amingle</h1>
    <p>Create Account</p>

    <form id="registerForm">

        <input
        type="text"
        id="username"
        placeholder="Username"
        required>

        <input
        type="email"
        id="email"
        placeholder="Email"
        required>

        <input
        type="password"
        id="password"
        placeholder="Password"
        required>

        <button type="submit">
            Register
        </button>

    </form>

    <div id="result"></div>

</div>

<script>

const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e)=>{

    e.preventDefault();

    const username =
    document.getElementById("username").value;

    const email =
    document.getElementById("email").value;

    const password =
    document.getElementById("password").value;

    try{

        const res = await fetch("/register",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                username,
                email,
                password
            })
        });

        const data = await res.json();

        document.getElementById("result")
        .innerHTML = data.message;

    }catch(err){

        document.getElementById("result")
        .innerHTML = "Server Error";

    }

});

</script>

</body>
</html>
