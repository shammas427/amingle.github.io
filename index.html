<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Amingle</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e1e1e;
padding:25px;
border-radius:15px;
width:350px;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#6c4cff;
color:white;
cursor:pointer;
}

#result{
margin-top:15px;
text-align:center;
}

</style>
</head>

<body>

<div class="box">

<h2>Register</h2>

<input
id="username"
placeholder="Username">

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="register()">
Register
</button>

<hr>

<h2>Login</h2>

<input
id="loginEmail"
placeholder="Email">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<div id="result"></div>

</div>

<script>

async function register(){

const response =
await fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

email:
document.getElementById("email").value,

password:
document.getElementById("password").value

})

});

const data =
await response.json();

document.getElementById("result")
.innerHTML = data.message;

}

async function login(){

const response =
await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById("loginEmail").value,

password:
document.getElementById("loginPassword").value

})

});

const data =
await response.json();

if(data.token){

localStorage.setItem(
"token",
data.token
);

document.getElementById("result")
.innerHTML =
"Login Successful";

}else{

document.getElementById("result")
.innerHTML =
data.message;

}

}

</script>

</body>
</html>
