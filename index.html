<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Amingle</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
}

.box{
background:#1e1e1e;
padding:20px;
border-radius:15px;
}

video{
width:100%;
height:250px;
background:black;
border-radius:10px;
object-fit:cover;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#6c4cff;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome To Amingle</h1>

<p>🔞 You must be 18+</p>

<p>No nudity or harassment</p>

<p>Violators will be banned</p>

<video
id="localVideo"
autoplay
playsinline
muted>
</video>

<div class="box">

<h2>Register</h2>

<input
id="username"
placeholder="Username">

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="register()">
Register
</button>

<hr>

<h2>Login</h2>

<input
id="loginEmail"
placeholder="Email">

<input
id="loginPassword"
type="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<button onclick="forgotPassword()">
Forgot Password
</button>

<div id="result"></div>

</div>

</div>

<script>

async function startCamera(){

try{

const stream =
await navigator.mediaDevices.getUserMedia({
video:true,
audio:false
});

document
.getElementById("localVideo")
.srcObject = stream;

}catch(err){

console.log(err);

}

}

startCamera();

async function register(){

const response =
await fetch("/register",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:
document.getElementById("username").value,

email:
document.getElementById("email").value,

password:
document.getElementById("password").value

})

});

const data =
await response.json();

document.getElementById("result")
.innerHTML=data.message;

}

async function login(){

const response =
await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:
document.getElementById("loginEmail").value,

password:
document.getElementById("loginPassword").value

})

});

const data =
await response.json();

if(data.token){

localStorage.setItem(
"token",
data.token
);

document.getElementById("result")
.innerHTML=
"Login Success";

}else{

document.getElementById("result")
.innerHTML=
data.message;

}

}

async function forgotPassword(){

const email =
prompt("Enter Email");

if(!email) return;

const response =
await fetch("/forgot-password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({email})

});

const data =
await response.json();

alert(data.message);

}

</script>

</body>
</html>
