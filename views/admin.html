<!DOCTYPE html>
<html>
<body>

<h2>Admin Dashboard</h2>

<div id="result"></div>

<script>

const token =
localStorage.getItem("token");

fetch("/admin/dashboard",{

headers:{
authorization:token
}

})
.then(res=>res.json())
.then(data=>{

document.getElementById(
"result"
).innerHTML =
data.message;

});

</script>

</body>
</html>
